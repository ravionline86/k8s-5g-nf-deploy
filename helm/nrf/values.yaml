# values.yaml — NRF Helm chart defaults
# Override per environment: helm install nrf helm/nrf -f my-env-values.yaml

replicaCount: 2

image:
  repository: nginx                  # nginx stub simulating NRF HTTP/2 SBI endpoint
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "nrf"

service:
  type: ClusterIP
  port: 8080
  targetPort: 80

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Readiness probe — K8s will not route traffic until this passes
# In a real NRF this would hit /nnrf-nfm/v1/nf-instances
readinessProbe:
  httpGet:
    path: /healthz
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

# Liveness probe — K8s restarts pod if this fails consecutively
livenessProbe:
  httpGet:
    path: /healthz
    port: 80
  initialDelaySeconds: 20
  periodSeconds: 15
  failureThreshold: 3

# PodDisruptionBudget — ensure at least 1 NRF pod stays up during rolling upgrades
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Pod anti-affinity — spread NRF pods across different nodes for HA
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - nrf
          topologyKey: kubernetes.io/hostname

env:
  NRF_PORT: "8080"
  NRF_LOG_LEVEL: "INFO"
  NF_HEARTBEAT_INTERVAL: "30"
  NRF_CACHE_TTL: "60"

configMapRef: nrf-config

serviceAccount:
  create: true
  name: "nrf-sa"

# Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  port: metrics

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podLabels:
  network-function: nrf
  sba-component: "true"
