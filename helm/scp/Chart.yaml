  - telecom
  - kubernetes
  - sba
  - model-d
  - 3gpp
home: https://github.com/ravionline86/k8s-5g-nf-deploy
sources:
  - https://github.com/ravionline86/k8s-5g-nf-deploy
maintainers:
  - name: Ravinder Kumar
    email: ravionline86@gmail.com
annotations:
  network-function: scp
  release: OC-SCP-25.1.200
