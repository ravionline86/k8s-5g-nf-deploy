apiVersion: v2
name: oc-scp
description: >
  Helm chart for Oracle OC-SCP (Service Communication Proxy) — 5G Core SBA component.
  Implements Model D indirect communication: routes NF consumer requests via SCP,
  which performs NRF discovery on behalf of the consumer per 3GPP TS 23.501.
