# hpa.yaml
# HorizontalPodAutoscaler for NRF and SCP.
# In carrier environments, SCP and NRF must scale rapidly during:
#   - Mass attach storms (e.g. after a power outage, all UEs re-register simultaneously)
#   - Peak traffic windows (busy hour signalling bursts)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nrf-hpa
  namespace: 5g-core
  labels:
    app: nrf
    network-function: nrf
    project: k8s-5g-nf-deploy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nrf
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 min before scaling down (avoid flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scp-hpa
  namespace: 5g-core
  labels:
    app: scp
    network-function: scp
    project: k8s-5g-nf-deploy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scp
  minReplicas: 2
  maxReplicas: 6                        # SCP handles all NF-to-NF traffic, needs higher ceiling
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55        # SCP is latency-sensitive — scale earlier than NRF
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # faster scale-up — SCP is in the live request path
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
