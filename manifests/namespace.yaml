# namespace.yaml
# Creates the 5g-core namespace with resource guardrails.
# ResourceQuota prevents any single namespace from exhausting cluster resources.
# LimitRange sets default CPU/memory requests on pods that don't specify them.
# This mirrors production namespace hygiene in Rakuten and KT deployments.

apiVersion: v1
kind: Namespace
metadata:
  name: 5g-core
  labels:
    app.kubernetes.io/managed-by: helm
    network-function-domain: core
    environment: production
    project: 5g-nf-deploy

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: 5g-core-quota
  namespace: 5g-core
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: 5g-core-limits
  namespace: 5g-core
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi

---
# Staging namespace — Jenkins deploys here first before promoting to production
apiVersion: v1
kind: Namespace
metadata:
  name: 5g-core-staging
  labels:
    app.kubernetes.io/managed-by: helm
    network-function-domain: core
    environment: staging
    project: 5g-nf-deploy
