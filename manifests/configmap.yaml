# configmap.yaml
# Runtime configuration for NRF and SCP Network Functions.
# Based on 3GPP TS 29.510 (NRF) and 3GPP TS 29.500 (SCP/SBA).
# In a production deployment these parameters would be passed via
# Helm values and mounted into the NF pod at /etc/nf/config/.

apiVersion: v1
kind: ConfigMap
metadata:
  name: nrf-config
  namespace: 5g-core
  labels:
    app: nrf
    network-function: nrf
    project: k8s-5g-nf-deploy
data:
  NRF_PORT: "8080"
  NRF_HTTPS_PORT: "8443"
  NRF_LOG_LEVEL: "INFO"

  # NF profile registration settings (3GPP TS 29.510)
  NF_HEARTBEAT_INTERVAL: "30"      # seconds between NF heartbeat updates to NRF
  NF_REGISTRATION_TTL: "86400"     # NF profile TTL in seconds (24h)

  # Discovery cache settings
  NRF_CACHE_TTL: "60"              # seconds to cache NF profiles locally
  NRF_MAX_NF_PROFILES: "500"       # max concurrent NF profiles stored

  nrf.conf: |
    server:
      port: 8080
      tls_port: 8443
      log_level: INFO
    registration:
      heartbeat_interval_sec: 30
      profile_ttl_sec: 86400
    discovery:
      cache_ttl_sec: 60
      max_profiles: 500
    sbi:
      # Service-Based Interface — NRF exposes Nnrf_NFManagement and Nnrf_NFDiscovery
      management_prefix: /nnrf-nfm/v1
      discovery_prefix: /nnrf-disc/v1

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scp-config
  namespace: 5g-core
  labels:
    app: scp
    network-function: scp
    project: k8s-5g-nf-deploy
data:
  SCP_PORT: "8080"
  SCP_LOG_LEVEL: "INFO"

  # NRF endpoint — SCP performs NRF discovery on behalf of NF consumers (Model D)
  NRF_ENDPOINT: "http://nrf.5g-core.svc.cluster.local:8080"
  NRF_DISCOVERY_URI: "/nnrf-disc/v1/nf-instances"

  # Routing and load balancing
  SCP_LB_POLICY: "round-robin"     # round-robin | least-connections | priority
  SCP_RETRY_COUNT: "3"
  SCP_TIMEOUT_MS: "5000"

  scp.conf: |
    # Model D: SCP performs NRF discovery on behalf of NF consumers
    # NF consumer ──▶ SCP ──▶ NRF (discovery) ──▶ NF producer
    server:
      port: 8080
      log_level: INFO
    nrf:
      endpoint: http://nrf.5g-core.svc.cluster.local:8080
      discovery_uri: /nnrf-disc/v1/nf-instances
    routing:
      lb_policy: round-robin
      retry_count: 3
      timeout_ms: 5000
    model: D
